<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Математикалык Эксперт</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-slate-900 p-8 rounded-3xl shadow-2xl border-2 border-cyan-500/50 text-center">
        <h1 class="text-2xl font-black mb-1 text-cyan-400">МАТЕМАТИКАЛЫК ЭКСПЕРТ</h1>
        <p class="text-[10px] text-slate-500 mb-6 tracking-widest uppercase">Формулалар • Тамырлар • Пифагор</p>

        <div id="setup">
            <input type="text" id="playerName" placeholder="Атыңызды жазыңыз..." class="w-full bg-slate-800 p-4 rounded-xl mb-4 text-center text-xl outline-none border border-slate-700 focus:border-cyan-500 text-white">
            <button onclick="startGame()" class="w-full bg-cyan-600 p-4 rounded-xl font-bold hover:bg-cyan-500 transition-all">БАШТОО</button>
        </div>

        <div id="game" class="hidden">
            <div class="flex justify-between mb-4 text-[12px] font-mono text-cyan-300/70">
                <span id="displayTopic">Тема: ...</span>
                <span id="displayScore">Упай: 0</span>
            </div>
            <div class="bg-slate-800/50 p-6 rounded-2xl mb-6 border border-slate-700">
                <h2 id="question" class="text-3xl font-bold"></h2>
            </div>
            <div id="options" class="grid grid-cols-1 gap-3"></div>
        </div>

        <div id="result" class="hidden">
            <h2 class="text-3xl font-bold text-yellow-400 mb-4">ОЮН БҮТТҮ!</h2>
            <p id="finalMsg" class="text-xl mb-6"></p>
            <button onclick="location.reload()" class="w-full bg-slate-700 p-4 rounded-xl font-bold">КАЙРА БАШТОО</button>
        </div>
    </div>

    <script>
        let score = 0, currentQ = 0;
        const questions = [
            { q: "(a + b)²", a: "a² + 2ab + b²", t: "Кыскача көбөйтүү", o: ["a² + b²", "a² + 2ab + b²", "a² - 2ab + b²"] },
            { q: "a² - b²", a: "(a-b)(a+b)", t: "Кыскача көбөйтүү", o: ["(a-b)²", "(a-b)(a+b)", "a - b"] },
            { q: "(a - b)²", a: "a² - 2ab + b²", t: "Кыскача көбөйтүү", o: ["a² - b²", "a² - 2ab + b²", "a² + 2ab + b²"] },
            { q: "√169", a: "13", t: "Иррационалдык", o: ["12", "13", "14"] },
            { q: "√81 + √49", a: "16", t: "Иррационалдык", o: ["15", "16", "130"] },
            { q: "√100 · √4", a: "20", t: "Иррационалдык", o: ["40", "20", "200"] },
            { q: "√225", a: "15", t: "Иррационалдык", o: ["25", "15", "12"] },
            { q: "a=3, b=4, c=?", a: "5", t: "Пифагор теоремасы", o: ["5", "7", "25"] },
            { q: "a=6, b=8, c=?", a: "10", t: "Пифагор теоремасы", o: ["14", "12", "10"] },
            { q: "a=5, b=12, c=?", a: "13", t: "Пифагор теоремасы", o: ["13", "17", "15"] }
        ];

        function startGame() {
            if(!document.getElementById('playerName').value) return alert("Атыңызды жазыңыз!");
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            if(currentQ >= questions.length) {
                document.getElementById('game').classList.add('hidden');
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('finalMsg').innerText = document.getElementById('playerName').value + ", сиз " + score + " упай топтодуңуз!";
                return;
            }
            const qData = questions[currentQ];
            document.getElementById('question').innerText = qData.q;
            document.getElementById('displayTopic').innerText = qData.t;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = "";
            qData.o.forEach(opt => {
                const b = document.createElement('button');
                b.innerText = opt;
                b.className = "w-full bg-slate-800 p-4 rounded-xl border border-slate-700 hover:border-cyan-500 transition-all text-lg";
                b.onclick = () => {
                    if(opt === qData.a) score += 10;
                    currentQ++;
                    document.getElementById('displayScore').innerText = "Упай: " + score;
                    showQuestion();
                };
                optDiv.appendChild(b);
            });
        }
    </script>
</body>
</html>
